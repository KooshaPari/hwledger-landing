version: '3'

tasks:
  default:
    desc: Build the landing page
    cmds:
      - task: build

  build:
    desc: Build the Astro site with Bun
    cmds:
      - bun run build

  test:
    desc: Run Astro and TypeScript checks
    cmds:
      - bunx astro check

  lint:
    desc: Run static checks for the Astro project
    cmds:
      - bunx astro check

  clean:
    desc: Remove generated build artifacts
    cmds:
      - rm -rf dist .astro .vercel .output coverage
