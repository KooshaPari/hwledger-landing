version: '3'

vars:
  REPO_STACK:
    sh: |
      if [ -f bun.lock ] || [ -f package.json ]; then
        echo node-bun
      elif [ -f pnpm-lock.yaml ]; then
        echo node-pnpm
      elif [ -f package-lock.json ]; then
        echo node-npm
      elif [ -f yarn.lock ]; then
        echo node-yarn
      elif [ -f pyproject.toml ] || [ -f requirements.txt ]; then
        echo python
      elif [ -f go.mod ]; then
        echo go
      elif [ -f Cargo.toml ]; then
        echo rust
      else
        echo unknown
      fi

tasks:
  default:
    desc: Show the detected stack and available tasks
    cmds:
      - task: detect

  detect:
    desc: Detect the repository language and package manager
    cmds:
      - echo "{{.REPO_STACK}}"

  build:
    desc: Build the project
    cmds:
      - cmd: |
          case "{{.REPO_STACK}}" in
            node-bun) bun run build ;;
            node-pnpm) pnpm run build ;;
            node-npm) npm run build ;;
            node-yarn) yarn build ;;
            python) python -m build ;;
            go) go build ./... ;;
            rust) cargo build ;;
            *)
              echo "Unsupported repository stack: {{.REPO_STACK}}" >&2
              exit 1
              ;;
          esac

  test:
    desc: Run repository verification checks
    cmds:
      - cmd: |
          case "{{.REPO_STACK}}" in
            node-bun) bunx astro check && bun run build ;;
            node-pnpm) pnpm exec astro check && pnpm run build ;;
            node-npm) npx astro check && npm run build ;;
            node-yarn) yarn astro check && yarn build ;;
            python) pytest ;;
            go) go test ./... ;;
            rust) cargo test ;;
            *)
              echo "Unsupported repository stack: {{.REPO_STACK}}" >&2
              exit 1
              ;;
          esac

  lint:
    desc: Run language-aware linting or static checks
    cmds:
      - cmd: |
          case "{{.REPO_STACK}}" in
            node-bun) bunx astro check ;;
            node-pnpm) pnpm exec astro check ;;
            node-npm) npx astro check ;;
            node-yarn) yarn astro check ;;
            python) ruff check . ;;
            go) golangci-lint run ;;
            rust) cargo clippy --all-targets --all-features -- -D warnings ;;
            *)
              echo "Unsupported repository stack: {{.REPO_STACK}}" >&2
              exit 1
              ;;
          esac

  clean:
    desc: Remove generated build artifacts
    cmds:
      - rm -rf dist .astro .vercel .output coverage
